<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Loading…</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;background:#000;color:#888;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
  .center{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px}
  .spinner{width:38px;height:38px;border:3px solid #333;border-top-color:#667eea;border-radius:50%;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .err{color:#f55;text-align:center;padding:20px;max-width:80%;font-size:14px}
  /* Hidden iframe so Dart's _checkMatchHasIframe passes.
     src="about:blank" is filtered out, so Dart falls back to loading
     this page in the WebView and lets the JS below run. */
  #_dh{display:none}
</style>
</head>
<body>
<iframe id="_dh" src="about:blank"></iframe>
<div class="center" id="status">
  <div class="spinner"></div>
  <div>Loading stream…</div>
</div>
<script>
(function(){
  'use strict';

  var FRAMES = [
    'https://vsys.kora-top.zip/frame.php',
    'https://ar.kora-top.zip/frame.php',
    'https://yalla.kora-top.zip/frame.php',
    'https://live.kora-top.zip/frame.php',
    'https://vip.kora-top.zip/frame.php'
  ];
  var P_VALUE = 12;

  function err(msg){
    var s=document.getElementById('status');
    if(s) s.innerHTML='<div class="err">'+msg+'</div>';
  }

  function getVisitorId(){
    var id = localStorage.getItem('v1');
    if(!id){
      var d = Date.now();
      id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c){
        var r = (d + Math.random()*16) % 16 | 0;
        return (c==='x' ? r : (r&3|8)).toString(16);
      });
      localStorage.setItem('v1', id);
    }
    return id;
  }

  function fetchAPI(base, matchId, lang){
    var ts = new Date();
    var t = '' + ts.getFullYear() + String(ts.getMonth()+1).padStart(2,'0') +
            String(ts.getDate()).padStart(2,'0') + String(ts.getHours()).padStart(2,'0') +
            String(ts.getMinutes()).padStart(2,'0');
    return fetch(base + 'api/matche/' + matchId + '/' + lang + '?t=' + t).then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    });
  }

  try {
    var p = new URLSearchParams(location.search);
    var m = p.get('m');
    var lang = p.get('lang') || 'ar';
    if (!m) { err('Missing match id'); return; }

    // Call kora-api, get channels, redirect DIRECTLY to kora-top.zip.
    // This makes kora-top.zip the TOP FRAME so injected scripts can
    // block popups, auto-click play, and control the UI.
    fetchAPI('https://kora-api.space/', m, lang)
      .catch(function(){ return fetchAPI('https://ws.kora-api.top/', m, lang); })
      .then(function(data){
        if(!data || !data.channels || !data.channels.length){
          err('No streams available yet. Try again when the match starts.');
          return;
        }
        var channels = data.channels;
        var ch0 = channels[0];
        var chKey = ch0.ch || ch0.key || '';
        var kt = Math.floor(Date.now() / 1000);
        var frame = FRAMES[Math.floor(Math.random() * FRAMES.length)];
        var url = frame + '?ch=' + chKey + '&p=' + P_VALUE + '&token=' + getVisitorId() + '&kt=' + kt;
        var chData = channels.map(function(c){
          return {n:c.server_name||c.server_name_en, ch:c.ch||c.key||'', e:c.edge, l:c.link, ml:c.mobile_link, t:c.type};
        });
        url += '#' + btoa(unescape(encodeURIComponent(JSON.stringify(chData))));
        location.replace(url);
      })
      .catch(function(e){
        // Fallback: go to 000007.mov if API fails
        var fallback = 'https://000007.mov/?m=' + encodeURIComponent(m) + '&lang=' + encodeURIComponent(lang);
        location.replace(fallback);
      });
  } catch(e){
    err(String(e && e.message || e));
  }
})();
</script>
</body>
</html>
